<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- ── Icon mark ── -->
  <!-- Outer hex ring -->
  <polygon points="36,6 58,18 58,42 36,54 14,42 14,18" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
  <!-- Inner box stack (inventory) -->
  <rect x="24" y="22" width="10" height="10" rx="1.5" fill="#3B82F6"/>
  <rect x="36" y="22" width="10" height="10" rx="1.5" fill="#22C55E"/>
  <rect x="24" y="34" width="10" height="10" rx="1.5" fill="#22C55E"/>
  <rect x="36" y="34" width="10" height="10" rx="1.5" fill="#3B82F6"/>
  <!-- AI circuit dot top-right -->
  <circle cx="52" cy="14" r="3" fill="#FACC15"/>
  <line x1="49" y1="14" x2="46" y2="17" stroke="#FACC15" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cart arc bottom -->
  <path d="M22 48 Q36 56 50 48" stroke="#3B82F6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="28" cy="51" r="1.5" fill="#22C55E"/>
  <circle cx="44" cy="51" r="1.5" fill="#22C55E"/>

  <!-- ── Wordmark ── -->
  <!-- "Smart" -->
  <text x="72" y="36" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Smart</text>
  <!-- "Stock" -->
  <text x="72" y="58" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#3B82F6" letter-spacing="-0.5">Stock</text>
  <!-- "U.D" tag -->
  <rect x="196" y="44" width="34" height="16" rx="4" fill="#22C55E"/>
  <text x="200" y="56" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">U.D</text>

  <!-- Tagline -->
  <text x="72" y="72" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" font-weight="400" fill="#64748B" letter-spacing="1.5">AI-POWERED INVENTORY</text>
</svg>
